<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Мониторинг Промо</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    
    <style>
      /* Намертво убираем вылеты за границы экрана и резиновый скролл */
      html, body {
        position: relative;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-x pan-y;
        overscroll-behavior: none; 
        /* Оптимизированный нативный тайминг переключения цвета темы */
        transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      #root {
        width: 100%;
        height: 100%;
        /* Форсируем запуск графического процессора (GPU) для ультра-плавности */
        backface-visibility: hidden;
        transform-style: preserve-3d;
        will-change: transform;
      }

      /* Скрытие системных полос прокрутки */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="bg-slate-100 dark:bg-slate-950 m-0 p-0 text-slate-800 antialiased">
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>

    <script>
      let startY = 0;
      let currentY = 0;
      let ticking = false;
      const root = document.getElementById('root');

      document.addEventListener('touchstart', (e) => {
        startY = e.touches[0].pageY;
      }, { passive: true });

      document.addEventListener('touchmove', (e) => {
        currentY = e.touches[0].pageY;

        // requestAnimationFrame синхронизирует анимацию с частотой обновления экрана смартфона
        if (!ticking && root) {
          window.requestAnimationFrame(() => {
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const diff = currentY - startY;

            // Натяжение у верхней границы
            if (scrollTop <= 0 && diff > 0) {
              const damping = Math.pow(diff, 0.55) * 1.2; // Идеальный коэффициент сопротивления
              root.style.transform = `translate3d(0, ${damping}px, 0)`; // translate3d включает 3D-ускорение
              root.style.transition = 'none';
            } 
            // Натяжение у нижней границы
            else if (scrollTop >= maxScroll && diff < 0) {
              const damping = -Math.pow(Math.abs(diff), 0.55) * 1.2;
              root.style.transform = `translate3d(0, ${damping}px, 0)`;
              root.style.transition = 'none';
            }
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });

      document.addEventListener('touchend', () => {
        if (!root) return;
        // Премиальная физика упругого возврата (Spring Physics Effect)
        root.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15)';
        root.style.transform = 'translate3d(0, 0, 0)';
      });
    </script>
  </body>
</html>
