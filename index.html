<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Мониторинг Промо</title>
    
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    
    <style>
      /* Намертво убираем вылеты за границы экрана и резиновый скролл */
      html, body {
        position: relative;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-x pan-y;
        overscroll-behavior: none; 
        transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      #root {
        width: 100%;
        height: 100%;
      }

      /* ИСПРАВЛЕНО: Включаем аппаратное GPU-ускорение для ленты карточек, чтобы она пружинила без лагов */
      main {
        backface-visibility: hidden;
        transform-style: preserve-3d;
        will-change: transform;
      }

      /* Скрытие системных полос прокрутки */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="bg-slate-100 dark:bg-slate-950 m-0 p-0 text-slate-800 antialiased">
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>

    <script>
      let startY = 0;
      let currentY = 0;
      let ticking = false;

      document.addEventListener('touchstart', (e) => {
        startY = e.touches[0].pageY;
      }, { passive: true });

      document.addEventListener('touchmove', (e) => {
        // Если открыто модальное окно (заблокирован overflow тела) — полностью отключаем анимацию
        if (document.body.style.overflow === 'hidden') return;

        currentY = e.touches[0].pageY;

        // ИСПРАВЛЕНО: Находим именно ленту документов main, а не весь сайт root
        const main = document.querySelector('main');
        if (!main) return;

        if (!ticking) {
          window.requestAnimationFrame(() => {
            const scrollTop = main.scrollTop;
            const maxScroll = main.scrollHeight - main.clientHeight;
            const diff = currentY - startY;

            // Натяжение у верхней границы (Шапка стоит на месте, пружинит только лента)
            if (scrollTop <= 0 && diff > 0) {
              const damping = Math.pow(diff, 0.55) * 1.2;
              main.style.transform = `translate3d(0, ${damping}px, 0)`;
              main.style.transition = 'none';
            } 
            // Натяжение у нижней границы списка
            else if (scrollTop >= maxScroll && diff < 0) {
              const damping = -Math.pow(Math.abs(diff), 0.55) * 1.2;
              main.style.transform = `translate3d(0, ${damping}px, 0)`;
              main.style.transition = 'none';
            }
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });

      document.addEventListener('touchend', () => {
        const main = document.querySelector('main');
        if (!main) return;
        // Мягкий нативный отскок ленты обратно под фиксированную шапку
        main.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15)';
        main.style.transform = 'translate3d(0, 0, 0)';
      });
    </script>
  </body>
</html>
